name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  airtrace-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++
      - name: Run deterministic test suite
        run: bash ./scripts/test.sh
